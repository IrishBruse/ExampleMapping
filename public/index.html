<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapping Tool — Sticky Board</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&display=swap");

      :root {
        --bg: #0f0f0f;
        --surface: #181818;
        --border: #2a2a2a;
        --text: #e8e8e8;
        --muted: #5a5a5a;
        --accent: #f0e040;

        --col-story: #f0e040;
        --col-rule: #4fc3f7;
        --col-example: #81c784;
        --col-question: #ef5350;

        --font-mono: "Space Mono", monospace;
        --font-display: "Bebas Neue", sans-serif;
        --radius: 2px;
        --panel-w: 300px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        height: 100dvh;
        display: grid;
        grid-template-columns: var(--panel-w) 1fr;
        grid-template-rows: 52px 1fr;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        grid-column: 1 / -1;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      header h1 {
        font-family: var(--font-display);
        font-size: 26px;
        letter-spacing: 0.08em;
        color: var(--accent);
        line-height: 1;
      }
      #status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--muted);
        transition: background 0.4s;
        flex-shrink: 0;
      }
      #status-dot.online {
        background: #4caf50;
        box-shadow: 0 0 6px #4caf50;
      }
      #note-count {
        margin-left: auto;
        color: var(--muted);
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      /* ── Sidebar ── */
      aside {
        background: var(--surface);
        border-right: 1px solid var(--border);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow-y: auto;
      }

      .field-label {
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 5px;
      }

      input[type="text"],
      textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        font-family: var(--font-mono);
        font-size: 13px;
        padding: 8px 10px;
        border-radius: var(--radius);
        outline: none;
        transition: border-color 0.2s;
        resize: none;
      }
      input[type="text"]:focus,
      textarea:focus {
        border-color: var(--accent);
      }
      textarea {
        height: 130px;
        line-height: 1.6;
      }

      .type-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }
      .type-btn {
        appearance: none;
        cursor: pointer;
        padding: 7px 4px;
        border-radius: var(--radius);
        border: 2px solid transparent;
        background: var(--bg);
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        text-align: center;
        transition: all 0.15s;
      }
      .type-btn[data-type="Story"] {
        border-color: var(--col-story);
      }
      .type-btn[data-type="Rule"] {
        border-color: var(--col-rule);
      }
      .type-btn[data-type="Example"] {
        border-color: var(--col-example);
      }
      .type-btn[data-type="Question"] {
        border-color: var(--col-question);
      }
      .type-btn.selected[data-type="Story"] {
        background: var(--col-story);
        color: #111;
      }
      .type-btn.selected[data-type="Rule"] {
        background: var(--col-rule);
        color: #111;
      }
      .type-btn.selected[data-type="Example"] {
        background: var(--col-example);
        color: #111;
      }
      .type-btn.selected[data-type="Question"] {
        background: var(--col-question);
        color: #fff;
      }

      #post-btn {
        width: 100%;
        padding: 10px;
        background: var(--accent);
        color: #111;
        border: none;
        font-family: var(--font-display);
        font-size: 20px;
        letter-spacing: 0.12em;
        border-radius: var(--radius);
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      #post-btn:hover {
        opacity: 0.88;
      }
      #post-btn:active {
        transform: scale(0.98);
      }
      #post-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      #char-count {
        text-align: right;
        color: var(--muted);
        font-size: 10px;
        margin-top: -8px;
      }

      .divider {
        border: none;
        border-top: 1px solid var(--border);
      }

      .filter-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .filter-chip {
        padding: 3px 9px;
        border-radius: 99px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.15s;
      }
      .filter-chip.active {
        background: var(--accent);
        color: #111;
        border-color: var(--accent);
      }

      /* ── Board ── */
      main {
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 14px;
      }

      #empty-msg {
        width: 100%;
        text-align: center;
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 60px 0;
      }

      /* ── Card ── */
      .card {
        width: 210px;
        min-height: 170px;
        padding: 12px;
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        gap: 7px;
        position: relative;
        animation: pop-in 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.55);
        word-break: break-word;
      }
      @keyframes pop-in {
        from {
          transform: scale(0.85) rotate(-2deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }
      .card[data-type="Story"] {
        background: var(--col-story);
        color: #111;
      }
      .card[data-type="Rule"] {
        background: var(--col-rule);
        color: #111;
      }
      .card[data-type="Example"] {
        background: var(--col-example);
        color: #111;
      }
      .card[data-type="Question"] {
        background: var(--col-question);
        color: #fff;
      }

      .card-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 6px;
      }
      .card-type {
        font-family: var(--font-display);
        font-size: 14px;
        letter-spacing: 0.1em;
        opacity: 0.5;
        line-height: 1;
      }
      .card-id {
        font-size: 9px;
        letter-spacing: 0.08em;
        opacity: 0.4;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* View mode */
      .card-content {
        font-size: 12.5px;
        line-height: 1.58;
        flex: 1;
        white-space: pre-wrap;
      }

      /* Edit mode */
      .card-edit-area {
        display: none;
        flex: 1;
        flex-direction: column;
        gap: 6px;
      }
      .card.editing .card-content {
        display: none;
      }
      .card.editing .card-edit-area {
        display: flex;
      }
      .card.editing .edit-btn {
        display: none;
      }
      .card.editing .save-btn,
      .card.editing .cancel-btn {
        display: inline-block;
      }

      .card-textarea {
        width: 100%;
        flex: 1;
        min-height: 80px;
        background: rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(0, 0, 0, 0.25);
        border-radius: 2px;
        color: inherit;
        font-family: var(--font-mono);
        font-size: 12px;
        line-height: 1.55;
        padding: 6px 8px;
        resize: none;
        outline: none;
      }
      .card[data-type="Question"] .card-textarea {
        color: #fff;
      }

      .card-actions {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .card-btn {
        font-family: var(--font-mono);
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 2px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        cursor: pointer;
        background: rgba(0, 0, 0, 0.12);
        color: inherit;
        transition: background 0.12s;
      }
      .card-btn:hover {
        background: rgba(0, 0, 0, 0.22);
      }
      .save-btn,
      .cancel-btn {
        display: none;
      }

      .card-meta {
        font-size: 10px;
        letter-spacing: 0.04em;
        opacity: 0.45;
        border-top: 1px solid rgba(0, 0, 0, 0.15);
        padding-top: 5px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .owner-badge {
        font-size: 9px;
        background: rgba(0, 0, 0, 0.15);
        border-radius: 2px;
        padding: 0 4px;
        letter-spacing: 0.06em;
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <header>
      <div id="status-dot"></div>
      <h1>MAPPING TOOL</h1>
      <span id="note-count"></span>
    </header>

    <aside>
      <div>
        <div class="field-label">Your name</div>
        <input
          type="text"
          id="author-input"
          placeholder="e.g. Alice"
          maxlength="32"
        />
      </div>

      <hr class="divider" />

      <div>
        <div class="field-label">Note type</div>
        <div class="type-grid">
          <button class="type-btn selected" data-type="Story">📖 Story</button>
          <button class="type-btn" data-type="Rule">📐 Rule</button>
          <button class="type-btn" data-type="Example">✅ Example</button>
          <button class="type-btn" data-type="Question">❓ Question</button>
        </div>
      </div>

      <div>
        <div class="field-label">Content</div>
        <textarea
          id="content-input"
          placeholder="Type your note… (Ctrl+Enter to post)"
          maxlength="600"
        ></textarea>
        <div id="char-count">0 / 600</div>
      </div>

      <button id="post-btn" disabled>POST NOTE</button>

      <hr class="divider" />

      <div>
        <div class="field-label">Filter board</div>
        <div class="filter-row">
          <button class="filter-chip active" data-filter="All">All</button>
          <button class="filter-chip" data-filter="Story">Story</button>
          <button class="filter-chip" data-filter="Rule">Rule</button>
          <button class="filter-chip" data-filter="Example">Example</button>
          <button class="filter-chip" data-filter="Question">Question</button>
        </div>
      </div>
    </aside>

    <main id="board">
      <div id="empty-msg">No notes yet — post the first one ↗</div>
    </main>

    <script>
      // ── State ──────────────────────────────────────────────────────────────────────
      let selectedType = "Story";
      let activeFilter = "All";
      let currentAuthor = ""; // updated whenever author-input changes

      /** @type {Map<string, object>} id → note */
      const notes = new Map();

      // ── Socket ─────────────────────────────────────────────────────────────────────
      const socket = io();
      const dot = document.getElementById("status-dot");
      const noteCount = document.getElementById("note-count");

      socket.on("connect", () => dot.classList.add("online"));
      socket.on("disconnect", () => dot.classList.remove("online"));

      socket.on("init_notes", (existing) => {
        existing.forEach((n) => notes.set(n.id, n));
        renderBoard();
      });

      socket.on("note_added", (note) => {
        notes.set(note.id, note);
        renderBoard();
        // Scroll new card into view
        requestAnimationFrame(() => {
          const el = document.querySelector(`[data-id="${note.id}"]`);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
        });
      });

      socket.on("note_updated", (note) => {
        notes.set(note.id, note);
        // Patch the card in place instead of full re-render
        const card = document.querySelector(`[data-id="${note.id}"]`);
        if (card) {
          card.querySelector(".card-content").textContent = note.content;
          // Exit edit mode if this client was editing it
          card.classList.remove("editing");
        }
      });

      socket.on("note_removed", (id) => {
        notes.delete(id);
        renderBoard();
      });

      // ── DOM refs ───────────────────────────────────────────────────────────────────
      const authorInput = document.getElementById("author-input");
      const contentInput = document.getElementById("content-input");
      const charCount = document.getElementById("char-count");
      const postBtn = document.getElementById("post-btn");
      const board = document.getElementById("board");
      const emptyMsg = document.getElementById("empty-msg");

      // ── Author tracking ────────────────────────────────────────────────────────────
      authorInput.addEventListener("input", () => {
        const prev = currentAuthor;
        currentAuthor = authorInput.value.trim();
        validateForm();
        // If name changed, refresh edit buttons on all cards
        if (prev !== currentAuthor) refreshOwnershipUI();
      });

      function refreshOwnershipUI() {
        document.querySelectorAll(".card").forEach((card) => {
          const id = card.dataset.id;
          const note = notes.get(id);
          if (!note) return;
          const isOwner =
            note.author.trim().toLowerCase() === currentAuthor.toLowerCase();
          const editBtn = card.querySelector(".edit-btn");
          if (editBtn)
            editBtn.style.display = isOwner ? "inline-block" : "none";
        });
      }

      // ── Type selector ──────────────────────────────────────────────────────────────
      document.querySelectorAll(".type-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          document
            .querySelectorAll(".type-btn")
            .forEach((b) => b.classList.remove("selected"));
          btn.classList.add("selected");
          selectedType = btn.dataset.type;
        });
      });

      // ── Filter chips ───────────────────────────────────────────────────────────────
      document.querySelectorAll(".filter-chip").forEach((chip) => {
        chip.addEventListener("click", () => {
          document
            .querySelectorAll(".filter-chip")
            .forEach((c) => c.classList.remove("active"));
          chip.classList.add("active");
          activeFilter = chip.dataset.filter;
          renderBoard();
        });
      });

      // ── Input validation ───────────────────────────────────────────────────────────
      function validateForm() {
        postBtn.disabled = !(
          authorInput.value.trim() && contentInput.value.trim()
        );
      }
      contentInput.addEventListener("input", () => {
        charCount.textContent = `${contentInput.value.length} / 600`;
        validateForm();
      });
      authorInput.addEventListener("input", validateForm);

      // ── Post note ──────────────────────────────────────────────────────────────────
      postBtn.addEventListener("click", () => {
        socket.emit("new_note", {
          author: authorInput.value.trim(),
          type: selectedType,
          content: contentInput.value.trim(),
        });
        contentInput.value = "";
        charCount.textContent = "0 / 600";
        postBtn.disabled = true;
      });

      contentInput.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && !postBtn.disabled)
          postBtn.click();
      });

      // ── Board render ───────────────────────────────────────────────────────────────
      function renderBoard() {
        const visible = [...notes.values()]
          .filter((n) => activeFilter === "All" || n.type === activeFilter)
          .sort((a, b) => {
            const [aT, aN] = a.id.split("_");
            const [bT, bN] = b.id.split("_");
            if (aT !== bT) return aT.localeCompare(bT);
            return parseInt(aN) - parseInt(bN);
          });

        noteCount.textContent = `${visible.length} note${visible.length !== 1 ? "s" : ""}`;

        if (visible.length === 0) {
          emptyMsg.style.display = "block";
          board.querySelectorAll(".card").forEach((c) => c.remove());
          return;
        }
        emptyMsg.style.display = "none";

        const rendered = new Set(
          [...board.querySelectorAll(".card")].map((c) => c.dataset.id),
        );

        // Remove cards that don't match filter anymore
        board.querySelectorAll(".card").forEach((c) => {
          if (!visible.find((n) => n.id === c.dataset.id)) c.remove();
        });

        // Add new cards (append preserves DOM order for existing)
        visible.forEach((note) => {
          if (!rendered.has(note.id)) board.appendChild(buildCard(note));
        });
      }

      // ── Card builder ───────────────────────────────────────────────────────────────
      function buildCard(note) {
        const isOwner =
          note.author.trim().toLowerCase() === currentAuthor.toLowerCase();

        const card = document.createElement("div");
        card.className = "card";
        card.dataset.id = note.id;
        card.dataset.type = note.type;

        const [type, num] = note.id.split("_");

        card.innerHTML = `
    <div class="card-header">
      <span class="card-type">${escHtml(note.type.toUpperCase())}</span>
      <span class="card-id">#${escHtml(num)}</span>
    </div>

    <!-- View mode -->
    <div class="card-content">${escHtml(note.content)}</div>

    <!-- Edit mode -->
    <div class="card-edit-area">
      <textarea class="card-textarea" maxlength="600">${escHtml(note.content)}</textarea>
    </div>

    <!-- Actions row -->
    <div class="card-actions">
      <button class="card-btn edit-btn"   style="display:${isOwner ? "inline-block" : "none"}">Edit</button>
      <button class="card-btn save-btn">Save</button>
      <button class="card-btn cancel-btn">Cancel</button>
    </div>

    <div class="card-meta">
      <span>${escHtml(note.author)}</span>
      ${isOwner ? '<span class="owner-badge">you</span>' : ""}
    </div>
  `;

        const editBtn = card.querySelector(".edit-btn");
        const saveBtn = card.querySelector(".save-btn");
        const cancelBtn = card.querySelector(".cancel-btn");
        const textarea = card.querySelector(".card-textarea");
        const contentDiv = card.querySelector(".card-content");

        editBtn.addEventListener("click", () => {
          textarea.value = note.content;
          card.classList.add("editing");
          textarea.focus();
          textarea.selectionStart = textarea.selectionEnd =
            textarea.value.length;
        });

        cancelBtn.addEventListener("click", () => {
          card.classList.remove("editing");
        });

        saveBtn.addEventListener("click", () => {
          const newContent = textarea.value.trim();
          if (!newContent || newContent === note.content) {
            card.classList.remove("editing");
            return;
          }
          // Optimistically update local state
          note.content = newContent;
          contentDiv.textContent = newContent;
          card.classList.remove("editing");
          socket.emit("edit_note", { id: note.id, content: newContent });
        });

        // Ctrl+Enter to save while editing
        textarea.addEventListener("keydown", (e) => {
          if ((e.ctrlKey || e.metaKey) && e.key === "Enter") saveBtn.click();
          if (e.key === "Escape") cancelBtn.click();
        });

        return card;
      }

      function escHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
    </script>
  </body>
</html>
